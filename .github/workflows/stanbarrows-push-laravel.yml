# Mirrors code/frontend/ to the public Laravel repository on each relevant push to main.
#
# Runs only on the StanBarrows fork (skipped on BLV-OSAV-USAV upstream).
#
# Required secret (fork Settings → Secrets and variables → Actions):
#   MY_GITHUB_TOKEN — classic PAT (repo scope) or fine-grained PAT for StanBarrows with
#   Contents: Read and write on GovTech-Hackathon-2026-Tierseuchen-Screener-Laravel
#
# Target: https://github.com/StanBarrows/GovTech-Hackathon-2026-Tierseuchen-Screener-Laravel

name: stanbarrows-push-laravel

on:
  push:
    branches: [main]
    paths:
      - 'code/frontend/**'
      - '.github/workflows/stanbarrows-push-laravel.yml'
  workflow_dispatch:

permissions:
  contents: read

env:
  TARGET_OWNER: StanBarrows
  TARGET_REPO: GovTech-Hackathon-2026-Tierseuchen-Screener-Laravel

jobs:
  sync:
    if: github.repository == 'StanBarrows/GovTech-Hackathon-2026-Tierseuchen-Screener'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout monorepo
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Authenticate to GitHub
        env:
          MY_GITHUB_TOKEN: ${{ secrets.MY_GITHUB_TOKEN }}
        run: |
          set -euo pipefail

          if [ -z "${MY_GITHUB_TOKEN:-}" ]; then
            echo "::error::Actions secret MY_GITHUB_TOKEN is not set on this fork. Add a StanBarrows PAT with Contents read/write on ${TARGET_OWNER}/${TARGET_REPO}. See code/frontend/SYNC.md."
            exit 1
          fi

          # Git only — avoids gh auth login, which wrongly requires read:org for repo-scoped PATs.
          git config --global credential.helper store
          printf 'https://x-access-token:%s@github.com\n' "$MY_GITHUB_TOKEN" > ~/.git-credentials

          REPO_JSON="$(curl -sf -H "Authorization: Bearer ${MY_GITHUB_TOKEN}" \
            "https://api.github.com/repos/${TARGET_OWNER}/${TARGET_REPO}")" || {
            echo "::error::MY_GITHUB_TOKEN cannot read ${TARGET_OWNER}/${TARGET_REPO}. Check PAT scope (public_repo or repo) and expiration."
            exit 1
          }

          if [ "$(printf '%s' "$REPO_JSON" | jq -r .permissions.push)" != "true" ]; then
            echo "::error::MY_GITHUB_TOKEN has no push access to ${TARGET_OWNER}/${TARGET_REPO}. Enable public_repo (classic) or Contents: Read and write (fine-grained)."
            exit 1
          fi

      - name: Clone target repository
        run: |
          set -euo pipefail
          TARGET="https://github.com/${TARGET_OWNER}/${TARGET_REPO}.git"

          if git clone "$TARGET" target-repo; then
            echo "Cloned ${TARGET_OWNER}/${TARGET_REPO}."
          else
            echo "Remote empty or not yet cloneable; initializing local repository."
            mkdir target-repo
            git -C target-repo init -b main
            git -C target-repo remote add origin "$TARGET"
          fi

      - name: Sync code/frontend to target
        run: |
          rsync -a --delete \
            --exclude='.git' \
            code/frontend/ target-repo/

      - name: Commit and push
        working-directory: target-repo
        run: |
          set -euo pipefail

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add -A

          if git diff --staged --quiet; then
            echo "No changes to sync."
            exit 0
          fi

          git commit -m "Sync from ${{ github.repository }}@${{ github.sha }}"
          # Monorepo is source of truth; overwrite remote main (README, failed runs, etc.).
          git push --force origin HEAD:main